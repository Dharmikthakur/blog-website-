{% extends "base.html" %}
{% block content %}
    <div class="content-section bg-white p-5 rounded-4 shadow-sm">
        <form method="POST" action="">
            <fieldset class="form-group">
                <legend class="border-bottom mb-4 display-6 fw-bold text-center">{{ legend }}</legend>
                
                <div class="mb-4">
                    <label for="author" class="form-label fw-600">Author Name</label>
                    <input type="text" name="author" id="author" class="form-control form-control-lg bg-light border-0 shadow-none" 
                           placeholder="Your name (optional)" value="{{ post.author if post else '' }}">
                </div>

                <div class="mb-4">
                    <label for="title" class="form-label fw-600">Title <span class="text-danger">*</span></label>
                    <input type="text" name="title" id="title" class="form-control form-control-lg bg-light border-0 shadow-none" 
                           placeholder="Catchy headline" value="{{ post.title if post else '' }}" required>
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label fw-600">Content <span class="text-danger">*</span></label>
                    <textarea name="content" id="content" rows="10" class="form-control bg-light border-0 shadow-none" 
                              placeholder="Write your story here..." required>{{ post.content if post else '' }}</textarea>
                </div>
            </fieldset>
            
            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                <a href="{{ url_for('home') }}" class="btn btn-light rounded-pill px-4 me-md-2">Cancel</a>
                <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5">{{ 'Update Post' if post else 'Publish Post' }}</button>
            </div>
        </form>
    </div>
{% endblock content %}
